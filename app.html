<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Signature authentication system</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
        }
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .welcome-board {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .welcome-board h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>

    <div class="container welcome-board">
        <div class="card">
            <h1>Welcome Back!</h1>
            <p class="subtitle">Access Granted. Your identity is verified.</p>
            
            <div style="margin-top: 3rem; display: flex; flex-direction: column; gap: 1rem;">
                <button class="primary" onclick="location.href='index.html?mode=enroll'">Change Signature</button>
                <button class="secondary" onclick="downloadData()">Save Data to Project File</button>
                <button class="danger" onclick="logout()">Sign Out</button>
            </div>

            <div id="neural-metrics" style="margin-top: 3rem; text-align: left; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--glass-border);">
                <h3 style="font-size: 0.875rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;">Layer 3: Latent Space Cluster</h3>
                <div style="display: flex; gap: 1.5rem; align-items: center;">
                    <canvas id="latent-canvas" width="150" height="150" style="background: #000; border-radius: 12px; border: 1px solid var(--accent-primary);"></canvas>
                    <div>
                        <p style="font-size: 0.75rem; color: var(--text-secondary);">Your neuromotor identity is mapped to a 2D manifold. Genuine signatures cluster in the center.</p>
                        <div id="latent-stats" style="margin-top: 0.5rem; font-family: monospace; font-size: 0.7rem; color: var(--accent-secondary);"></div>
                    </div>
                </div>
            </div>

            <p style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary); line-height: 1.4;">
                <b>Neural Engine:</b> Active. Siamese Identity Embedding is running in the background.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="index.js"></script>

    <script>
        if (localStorage.getItem("authenticated") !== "true") {
            window.location.replace("index.html");
        }

        const lCanvas = document.getElementById('latent-canvas');
        const lCtx = lCanvas.getContext('2d');
        function drawLatentPoint(x, y, isGenuine = true) {
            const centerX = lCanvas.width / 2;
            const centerY = lCanvas.height / 2;
            const px = centerX + (x * 50);
            const py = centerY + (y * 50);
            
            lCtx.beginPath();
            lCtx.arc(px, py, 4, 0, Math.PI * 2);
            lCtx.fillStyle = isGenuine ? '#38bdf8' : '#ef4444';
            lCtx.fill();
        }

        const stats = JSON.parse(localStorage.getItem("sig_stats") || "{}");
        if (stats.lastScore) {
            document.getElementById('latent-stats').textContent = `Trust Score: ${(stats.lastScore * 100).toFixed(1)}%`;
            lCtx.clearRect(0, 0, lCanvas.width, lCanvas.height);
            for(let i=0; i<10; i++) drawLatentPoint((Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3);
        }

        function logout() {
            localStorage.removeItem("authenticated");
            window.location.replace("index.html");
        }

        const fwCanvas = document.getElementById('fireworks-canvas');
        const fwCtx = fwCanvas.getContext('2d');
        let particles = [];

        function resize() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }
            draw() {
                fwCtx.save();
                fwCtx.globalAlpha = this.alpha;
                fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                fwCtx.fillStyle = this.color;
                fwCtx.fill();
                fwCtx.restore();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createFirework(x, y) {
            const count = 30;
            const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            fwCtx.fillStyle = 'rgba(15, 23, 42, 0.2)';
            fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            particles.forEach((p, i) => {
                if (p.alpha > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });

            if (Math.random() < 0.05) {
                createFirework(Math.random() * fwCanvas.width, Math.random() * fwCanvas.height * 0.5);
            }
        }
        animate();
    </script>
</body>
</html>
