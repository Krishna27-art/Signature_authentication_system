<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | BioSign Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden; /* Prevent scrolling for fireworks */
        }
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .welcome-board {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .welcome-board h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>

    <div class="container welcome-board">
        <div class="card">
            <h1>Welcome Back!</h1>
            <p class="subtitle">Access Granted. Your identity is verified.</p>
            
            <div style="margin-top: 3rem; display: flex; flex-direction: column; gap: 1rem;">
                <button class="primary" onclick="location.href='index.html?mode=enroll'">Change Signature</button>
                <button class="secondary" onclick="downloadData()">Save Data to Project File</button>
                <button class="danger" onclick="logout()">Sign Out</button>
            </div>

            <p style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary); line-height: 1.4;">
                <b>Note:</b> For security, browsers cannot write directly to your disk. Clicking "Save Data" will download <code>signature_data.json</code>. Please move it to your project folder to keep it formal.
            </p>
        </div>
    </div>

    <script src="index.js"></script>

    <script>
        // Guard: redirect to login if not authenticated
        if (localStorage.getItem("authenticated") !== "true") {
            window.location.replace("index.html");
        }

        function logout() {
            localStorage.removeItem("authenticated");
            window.location.replace("index.html");
        }

        // --- FIREWORKS ANIMATION ---
        const fwCanvas = document.getElementById('fireworks-canvas');
        const fwCtx = fwCanvas.getContext('2d');
        let particles = [];

        function resize() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.95;
            }
            draw() {
                fwCtx.save();
                fwCtx.globalAlpha = this.alpha;
                fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                fwCtx.fillStyle = this.color;
                fwCtx.fill();
                fwCtx.restore();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createFirework(x, y) {
            const count = 30;
            const color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            fwCtx.fillStyle = 'rgba(15, 23, 42, 0.2)'; // Match root bg
            fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
            
            particles.forEach((p, i) => {
                if (p.alpha > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });

            if (Math.random() < 0.05) {
                createFirework(Math.random() * fwCanvas.width, Math.random() * fwCanvas.height * 0.5);
            }
        }
        animate();
    </script>
</body>
</html>
