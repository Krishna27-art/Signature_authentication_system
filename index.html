<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature authentication system </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="modeTitle">Signature authentication system</h1>
           
            <div id="status">Initializing system...</div>

            <div class="canvas-container">
                <canvas id="canvas" width="500" height="300"></canvas>
            </div>

            <div class="actions">
                <button id="verifyBtn" class="primary" onclick="verifySignature()">Verify Identity</button>
                <button id="saveBtn" class="primary" onclick="saveSignature()">Complete Registration</button>
                <button id="clearBtn" class="danger" onclick="clearCanvas()">Clear Canvas</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
